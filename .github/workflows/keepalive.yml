name: Supabase Keepalive

on:
  schedule:
    - cron: '0 8 */5 * *'  # 每5天早上8点自动运行
  workflow_dispatch:        # 也可手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent project pause
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          echo " — Supabase pinged at $(date)"
